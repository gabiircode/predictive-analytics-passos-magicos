version: '3.8'

services:
  # Container do Aplicativo Streamlit
  streamlit-app:
    build: 
      context: ./app
      dockerfile: Dockerfile
    container_name: passos_streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # Container do Jupyter Notebook
  jupyter-notebook:
    image: jupyter/scipy-notebook:python-3.10
    container_name: passos_jupyter_notebook
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./app:/home/jovyan/work/app
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=passosmagicos
    restart: unless-stopped
